[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = []

[phases.build]
cmds = [
  "npm install -g pnpm@10.33.3",
  "cd skill_swap_app && pnpm install --no-frozen-lockfile",
  "cd skill_swap_app && pnpm --filter @skillswap/api build"
]

[start]
cmd = "node skill_swap_app/apps/api/dist/index.js"
