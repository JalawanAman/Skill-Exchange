name: CI

# Runs on every push and pull request. Catches type errors and lint issues
# before code is merged to dev / promoted to main.
on:
  push:
  pull_request:

# Cancel an in-progress run if a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill_swap_app # the pnpm workspace root (repo is double-nested)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: skill_swap_app/package.json # reads the pinned pnpm version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: skill_swap_app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (API)
        run: pnpm --filter @skillswap/api run typecheck

      - name: Typecheck (Web)
        run: pnpm --filter @skillswap/web run typecheck

      - name: Lint (API)
        run: pnpm --filter @skillswap/api run lint

      - name: Lint (Web)
        run: pnpm --filter @skillswap/web run lint
